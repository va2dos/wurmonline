<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="300" fill="#1b130c"/>

  <!-- Common styles (conceptual, adjust in code or via CSS if inlined) -->
  <!-- Layer heights -->
  <!-- Starfall: 40, Week: 40, Day: 40, Hour: 30, Harvest: 40 -->

  <!-- ===== LAYER 1: STARFALL & SEASON ===== -->
  <!-- Bar background -->
  <rect x="50" y="20" width="1100" height="40" fill="#c9b27a" stroke="#4a3a1f" stroke-width="2"/>

  <!-- Starfall segments (7) -->
  <!-- Each segment width: 1100 / 7 ≈ 157 -->
  <!-- Leaf -->
  <rect x="50" y="20" width="157" height="40" fill="#b7d38a" opacity="0.9"/>
  <text x="128" y="45" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">Leaf</text>

  <!-- Bear -->
  <rect x="207" y="20" width="157" height="40" fill="#e0c27a" opacity="0.9"/>
  <text x="285" y="45" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">Bear</text>

  <!-- Snake -->
  <rect x="364" y="20" width="157" height="40" fill="#f0d28a" opacity="0.9"/>
  <text x="442" y="45" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">Snake</text>

  <!-- White Shark -->
  <rect x="521" y="20" width="157" height="40" fill="#f7e0a0" opacity="0.9"/>
  <text x="599" y="45" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">W. Shark</text>

  <!-- Fire -->
  <rect x="678" y="20" width="157" height="40" fill="#f4b26a" opacity="0.9"/>
  <text x="756" y="45" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">Fire</text>

  <!-- Raven -->
  <rect x="835" y="20" width="157" height="40" fill="#d89b5a" opacity="0.9"/>
  <text x="913" y="45" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">Raven</text>

  <!-- Digging -->
  <rect x="992" y="20" width="157" height="40" fill="#c47f4a" opacity="0.9"/>
  <text x="1070" y="45" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">Digging</text>

  <!-- Label -->
  <text x="55" y="15" font-family="serif" font-size="12" fill="#f5e9c8">Starfall Season</text>

  <!-- ===== LAYER 2: WEEKS ===== -->
  <rect x="50" y="70" width="1100" height="40" fill="#bfa676" stroke="#4a3a1f" stroke-width="2"/>

  <!-- Week segments (4) width: 275 -->
  <rect x="50" y="70" width="275" height="40" fill="#d1b47a" opacity="0.9"/>
  <text x="187" y="95" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">Week 1</text>

  <rect x="325" y="70" width="275" height="40" fill="#c9aa72" opacity="0.9"/>
  <text x="462" y="95" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">Week 2</text>

  <rect x="600" y="70" width="275" height="40" fill="#c09f6a" opacity="0.9"/>
  <text x="737" y="95" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">Week 3</text>

  <rect x="875" y="70" width="275" height="40" fill="#b89662" opacity="0.9"/>
  <text x="1012" y="95" text-anchor="middle" font-family="serif" font-size="14" fill="#3b2a16">Week 4</text>

  <text x="55" y="65" font-family="serif" font-size="12" fill="#f5e9c8">Wurm Weeks</text>

  <!-- ===== LAYER 3: DAYS ===== -->
  <rect x="50" y="120" width="1100" height="40" fill="#8b6a3c" stroke="#4a3a1f" stroke-width="2"/>

  <!-- Day segments (7) width: 157 -->
  <rect x="50" y="120" width="157" height="40" fill="#9b7a46" opacity="0.9"/>
  <text x="128" y="145" text-anchor="middle" font-family="serif" font-size="13" fill="#f5e9c8">Awakening</text>

  <rect x="207" y="120" width="157" height="40" fill="#9b7a46" opacity="0.9"/>
  <text x="285" y="145" text-anchor="middle" font-family="serif" font-size="13" fill="#f5e9c8">Luck</text>

  <rect x="364" y="120" width="157" height="40" fill="#9b7a46" opacity="0.9"/>
  <text x="442" y="145" text-anchor="middle" font-family="serif" font-size="13" fill="#f5e9c8">Tears</text>

  <rect x="521" y="120" width="157" height="40" fill="#9b7a46" opacity="0.9"/>
  <text x="599" y="145" text-anchor="middle" font-family="serif" font-size="13" fill="#f5e9c8">Sleep</text>

  <rect x="678" y="120" width="157" height="40" fill="#9b7a46" opacity="0.9"/>
  <text x="756" y="145" text-anchor="middle" font-family="serif" font-size="13" fill="#f5e9c8">Woe</text>

  <rect x="835" y="120" width="157" height="40" fill="#9b7a46" opacity="0.9"/>
  <text x="913" y="145" text-anchor="middle" font-family="serif" font-size="13" fill="#f5e9c8">Storm</text>

  <rect x="992" y="120" width="157" height="40" fill="#9b7a46" opacity="0.9"/>
  <text x="1070" y="145" text-anchor="middle" font-family="serif" font-size="13" fill="#f5e9c8">Dancer</text>

  <text x="55" y="115" font-family="serif" font-size="12" fill="#f5e9c8">Wurm Days</text>

  <!-- ===== LAYER 4: HOURS ===== -->
  <rect x="50" y="170" width="1100" height="30" fill="url(#hourGradient)" stroke="#4a3a1f" stroke-width="2"/>

  <!-- Hour ticks (24) -->
  <!-- Each tick: width ~ 1100 / 24 ≈ 45.8 -->
  <!-- Just show some major ticks for mockup -->
  <line x1="50" y1="170" x2="50" y2="200" stroke="#f5e9c8" stroke-width="1"/>
  <line x1="200" y1="170" x2="200" y2="200" stroke="#f5e9c8" stroke-width="1"/>
  <line x1="350" y1="170" x2="350" y2="200" stroke="#f5e9c8" stroke-width="1"/>
  <line x1="500" y1="170" x2="500" y2="200" stroke="#f5e9c8" stroke-width="1"/>
  <line x1="650" y1="170" x2="650" y2="200" stroke="#f5e9c8" stroke-width="1"/>
  <line x1="800" y1="170" x2="800" y2="200" stroke="#f5e9c8" stroke-width="1"/>
  <line x1="950" y1="170" x2="950" y2="200" stroke="#f5e9c8" stroke-width="1"/>
  <line x1="1150" y1="170" x2="1150" y2="200" stroke="#f5e9c8" stroke-width="1"/>

  <text x="55" y="165" font-family="serif" font-size="12" fill="#f5e9c8">Wurm Hours</text>

  <!-- Hour gradient definition -->
  <defs>
    <linearGradient id="hourGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b1b3b"/>   <!-- Midnight -->
      <stop offset="25%" stop-color="#f28c3c"/>  <!-- Dawn -->
      <stop offset="50%" stop-color="#ffd86b"/>  <!-- Noon -->
      <stop offset="75%" stop-color="#b46fd8"/>  <!-- Dusk -->
      <stop offset="100%" stop-color="#0b1b3b"/> <!-- Midnight -->
    </linearGradient>
  </defs>

  <!-- ===== LAYER 5: HARVEST WINDOWS ===== -->
  <rect x="50" y="210" width="1100" height="40" fill="#5b3c24" stroke="#4a3a1f" stroke-width="2"/>

  <!-- Example harvest blocks -->
  <!-- Olive -->
  <rect x="80" y="215" width="250" height="30" fill="#7fa35a" opacity="0.9"/>
  <text x="205" y="235" text-anchor="middle" font-family="serif" font-size="13" fill="#f5e9c8">Olive</text>

  <!-- Camellia -->
  <rect x="360" y="215" width="220" height="30" fill="#b46f9c" opacity="0.9"/>
  <text x="470" y="235" text-anchor="middle" font-family="serif" font-size="13" fill="#f5e9c8">Camellia</text>

  <!-- Oleander -->
  <rect x="610" y="215" width="260" height="30" fill="#c48f6a" opacity="0.9"/>
  <text x="740" y="235" text-anchor="middle" font-family="serif" font-size="13" fill="#f5e9c8">Oleander</text>

  <!-- Empty future harvest -->
  <rect x="890" y="215" width="230" height="30" fill="#3b2616" opacity="0.7"/>
  <text x="1005" y="235" text-anchor="middle" font-family="serif" font-size="12" fill="#c9b27a">Future harvests</text>

  <text x="55" y="205" font-family="serif" font-size="12" fill="#f5e9c8">Harvest Seasons</text>

  <!-- ===== CURSORS ===== -->
  <!-- Calendar cursor (example position) -->
  <!-- Vertical glowing line crossing all layers -->
  <line x1="450" y1="20" x2="450" y2="250" stroke="#ffd86b" stroke-width="3" opacity="0.9"/>
  <circle cx="450" cy="18" r="5" fill="#ffd86b"/>

  <!-- Time cursor (example position) -->
  <line x1="780" y1="170" x2="780" y2="200" stroke="#fffae0" stroke-width="3" opacity="0.9"/>
  <circle cx="780" cy="165" r="5" fill="#fffae0"/>

  <!-- Title -->
  <text x="600" y="295" text-anchor="middle" font-family="serif" font-size="14" fill="#f5e9c8">
    Wurm Timeline Mockup
  </text>

</svg>
